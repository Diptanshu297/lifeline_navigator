services:
  # Backend — FastAPI on Render
  - type: web
    name: lifeline-navigator-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: graph-cache
      mountPath: /app/data
      sizeGB: 2
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
    plan: starter                      # free tier

  # Frontend — static site on Render
  - type: web
    name: lifeline-navigator-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://lifeline-navigator-api.onrender.com/api/:splat
      - type: rewrite
        source: /*
        destination: /index.html
    plan: free
